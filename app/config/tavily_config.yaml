web_search:
  enabled: true
  google_search_url: "https://api.tavily.com/search"
  engine: "tavily"
  search_depth: "advanced"
  api_key_env_name: "TAVILY_WEB_SEARCH"
  default_gl: "us"
  default_hl: "en"
  default_num: 3
  timeout_seconds: 8.0
  fast_timeout_seconds: 18.0
  max_concurrency: 4
  queue_workers: 4
  queue_max_size: 200
  always_web_retrieval_enabled: true
  retrieval_fanout_enabled: true
  fallback_enabled: true
  fallback_similarity_threshold: 0.20
  expansion_similarity_threshold: 0.20
  phase1_max_queries: 5
  phase1_max_results_per_query: 3
  phase1_max_total_urls_to_fetch: 8
  phase1_max_pdfs_to_read: 3
  phase1_max_pdf_size_mb: 15
  phase1_max_pdf_pages: 40
  phase1_max_evidence_chunks: 12
  allowed_domain_suffixes:
    - ".de"
    - ".eu"
  official_source_filter_enabled: true
  official_source_allowlist:
    - "daad.de"
    - "uni-assist.de"
  max_context_results: 4
  fetch_page_content: true
  max_pages_to_fetch: 8
  page_fetch_timeout_seconds: 12.0
  max_page_chars: 24000
  strip_boilerplate: true
  min_clean_line_chars: 8
  page_chunk_chars: 850
  page_chunk_overlap_chars: 120
  max_chunks_per_page: 4
  min_chunk_chars: 140
  chunk_dedupe_similarity: 0.9
  trust_relevance_weight: 0.5
  trust_authority_weight: 0.3
  trust_recency_weight: 0.0
  trust_agreement_weight: 0.2
  cache_max_not_verified_mentions: 3
  retry_max_attempts: 2
  retry_base_backoff_seconds: 0.4
  german_university_mode_enabled: true
  german_university_authority_boost: 0.15
  german_education_domain_priority: true
  german_specific_extraction_enabled: true
  evidence_specificity_validation_enabled: true
  evidence_specificity_min_score: 0.2
  answer_validation_enabled: true
  answer_validation_min_quality_score: 0.6
