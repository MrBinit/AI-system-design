services:
  api:
    environment:
      APP_DOCS_ENABLED: "true"
      POSTGRES_ENABLED: "false"
      REDIS_APP_HOST: "redis"
      REDIS_APP_PORT: "6379"
      REDIS_APP_DB: "0"
      REDIS_APP_USERNAME: ""
      REDIS_APP_PASSWORD: ""
      REDIS_APP_TLS: "false"
      REDIS_APP_SSL_CERT_REQS: "none"
      REDIS_APP_SSL_CA_CERTS: ""
      REDIS_WORKER_HOST: "redis"
      REDIS_WORKER_PORT: "6379"
      REDIS_WORKER_DB: "0"
      REDIS_WORKER_USERNAME: ""
      REDIS_WORKER_PASSWORD: ""
      REDIS_WORKER_TLS: "false"
      REDIS_WORKER_SSL_CERT_REQS: "none"
      REDIS_WORKER_SSL_CA_CERTS: ""
      MIDDLEWARE_TRUSTED_PROXY_CIDRS: "127.0.0.1/32,172.16.0.0/12"

  worker:
    environment:
      POSTGRES_ENABLED: "false"
      REDIS_APP_HOST: "redis"
      REDIS_APP_PORT: "6379"
      REDIS_APP_DB: "0"
      REDIS_APP_USERNAME: ""
      REDIS_APP_PASSWORD: ""
      REDIS_APP_TLS: "false"
      REDIS_APP_SSL_CERT_REQS: "none"
      REDIS_APP_SSL_CA_CERTS: ""
      REDIS_WORKER_HOST: "redis"
      REDIS_WORKER_PORT: "6379"
      REDIS_WORKER_DB: "0"
      REDIS_WORKER_USERNAME: ""
      REDIS_WORKER_PASSWORD: ""
      REDIS_WORKER_TLS: "false"
      REDIS_WORKER_SSL_CERT_REQS: "none"
      REDIS_WORKER_SSL_CA_CERTS: ""

  gradio:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    image: ai-system-gradio:latest
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_ENABLED: "false"
      REDIS_RUNTIME_ROLE: app
      REDIS_APP_HOST: "redis"
      REDIS_APP_PORT: "6379"
      REDIS_APP_DB: "0"
      REDIS_APP_USERNAME: ""
      REDIS_APP_PASSWORD: ""
      REDIS_APP_TLS: "false"
      REDIS_APP_SSL_CERT_REQS: "none"
      REDIS_APP_SSL_CA_CERTS: ""
      REDIS_WORKER_HOST: "redis"
      REDIS_WORKER_PORT: "6379"
      REDIS_WORKER_DB: "0"
      REDIS_WORKER_USERNAME: ""
      REDIS_WORKER_PASSWORD: ""
      REDIS_WORKER_TLS: "false"
      REDIS_WORKER_SSL_CERT_REQS: "none"
      REDIS_WORKER_SSL_CA_CERTS: ""
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
