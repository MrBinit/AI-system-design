services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-system:latest
    init: true
    restart: unless-stopped
    environment:
      REDIS_RUNTIME_ROLE: app
      REDIS_LOCAL_TUNNEL_ENABLED: ${REDIS_LOCAL_TUNNEL_ENABLED:-}
      API_WORKERS: ${API_WORKERS:-2}
      SECURITY_LOGIN_USERS_JSON: ${SECURITY_LOGIN_USERS_JSON:-}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-}
      MEMORY_ENCRYPTION_KEY: ${MEMORY_ENCRYPTION_KEY:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      TAVILY_WEB_SEARCH: ${TAVILY_WEB_SEARCH:-}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-}
      WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED: ${WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED: ${WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED:-}
      WEB_SEARCH_FALLBACK_ENABLED: ${WEB_SEARCH_FALLBACK_ENABLED:-}
      WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD: ${WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD: ${WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_QUERY_PLANNER_ENABLED: ${WEB_SEARCH_QUERY_PLANNER_ENABLED:-}
      WEB_SEARCH_QUERY_PLANNER_USE_LLM: ${WEB_SEARCH_QUERY_PLANNER_USE_LLM:-}
      WEB_SEARCH_RETRIEVAL_LOOP_ENABLED: ${WEB_SEARCH_RETRIEVAL_LOOP_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM: ${WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM:-}
      WEB_SEARCH_MULTI_QUERY_ENABLED: ${WEB_SEARCH_MULTI_QUERY_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS: ${WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS:-}
      WEB_SEARCH_MAX_QUERY_VARIANTS: ${WEB_SEARCH_MAX_QUERY_VARIANTS:-}
      WEB_SEARCH_DEFAULT_NUM: ${WEB_SEARCH_DEFAULT_NUM:-}
      WEB_SEARCH_MAX_CONTEXT_RESULTS: ${WEB_SEARCH_MAX_CONTEXT_RESULTS:-}
      WEB_SEARCH_FETCH_PAGE_CONTENT: ${WEB_SEARCH_FETCH_PAGE_CONTENT:-}
      WEB_SEARCH_MAX_PAGES_TO_FETCH: ${WEB_SEARCH_MAX_PAGES_TO_FETCH:-}
      WEB_SEARCH_MAX_CONCURRENCY: ${WEB_SEARCH_MAX_CONCURRENCY:-}
      WEB_SEARCH_QUEUE_WORKERS: ${WEB_SEARCH_QUEUE_WORKERS:-}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-}
      WEB_SEARCH_SEARCH_DEPTH: ${WEB_SEARCH_SEARCH_DEPTH:-}
      WEB_SEARCH_RETRY_MAX_ATTEMPTS: ${WEB_SEARCH_RETRY_MAX_ATTEMPTS:-}
      WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS: ${WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS:-}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-}
      BEDROCK_FALLBACK_MODEL_ID: ${BEDROCK_FALLBACK_MODEL_ID:-}
      BEDROCK_WEB_GROUNDING_ENABLED: ${BEDROCK_WEB_GROUNDING_ENABLED:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:-}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/metrics:/app/data/metrics
    command: ["sh", "-c", "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${API_WORKERS}"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-system:latest
    init: true
    restart: unless-stopped
    environment:
      REDIS_RUNTIME_ROLE: worker
      REDIS_LOCAL_TUNNEL_ENABLED: ${REDIS_LOCAL_TUNNEL_ENABLED:-}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-}
      MEMORY_ENCRYPTION_KEY: ${MEMORY_ENCRYPTION_KEY:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      TAVILY_WEB_SEARCH: ${TAVILY_WEB_SEARCH:-}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-}
      WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED: ${WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED: ${WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED:-}
      WEB_SEARCH_FALLBACK_ENABLED: ${WEB_SEARCH_FALLBACK_ENABLED:-}
      WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD: ${WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD: ${WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_QUERY_PLANNER_ENABLED: ${WEB_SEARCH_QUERY_PLANNER_ENABLED:-}
      WEB_SEARCH_QUERY_PLANNER_USE_LLM: ${WEB_SEARCH_QUERY_PLANNER_USE_LLM:-}
      WEB_SEARCH_RETRIEVAL_LOOP_ENABLED: ${WEB_SEARCH_RETRIEVAL_LOOP_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM: ${WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM:-}
      WEB_SEARCH_MULTI_QUERY_ENABLED: ${WEB_SEARCH_MULTI_QUERY_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS: ${WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS:-}
      WEB_SEARCH_MAX_QUERY_VARIANTS: ${WEB_SEARCH_MAX_QUERY_VARIANTS:-}
      WEB_SEARCH_DEFAULT_NUM: ${WEB_SEARCH_DEFAULT_NUM:-}
      WEB_SEARCH_MAX_CONTEXT_RESULTS: ${WEB_SEARCH_MAX_CONTEXT_RESULTS:-}
      WEB_SEARCH_FETCH_PAGE_CONTENT: ${WEB_SEARCH_FETCH_PAGE_CONTENT:-}
      WEB_SEARCH_MAX_PAGES_TO_FETCH: ${WEB_SEARCH_MAX_PAGES_TO_FETCH:-}
      WEB_SEARCH_MAX_CONCURRENCY: ${WEB_SEARCH_MAX_CONCURRENCY:-}
      WEB_SEARCH_QUEUE_WORKERS: ${WEB_SEARCH_QUEUE_WORKERS:-}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-}
      WEB_SEARCH_SEARCH_DEPTH: ${WEB_SEARCH_SEARCH_DEPTH:-}
      WEB_SEARCH_RETRY_MAX_ATTEMPTS: ${WEB_SEARCH_RETRY_MAX_ATTEMPTS:-}
      WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS: ${WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS:-}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-}
      BEDROCK_FALLBACK_MODEL_ID: ${BEDROCK_FALLBACK_MODEL_ID:-}
      BEDROCK_WEB_GROUNDING_ENABLED: ${BEDROCK_WEB_GROUNDING_ENABLED:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:-}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-}
    command: ["python", "-m", "app.scripts.summary_worker"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from app.infra.redis_client import worker_redis_client as c; raise SystemExit(0 if c.ping() else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s

  llm-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-system:latest
    init: true
    restart: unless-stopped
    profiles: ["llm-async"]
    environment:
      REDIS_RUNTIME_ROLE: app
      REDIS_LOCAL_TUNNEL_ENABLED: ${REDIS_LOCAL_TUNNEL_ENABLED:-}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-}
      MEMORY_ENCRYPTION_KEY: ${MEMORY_ENCRYPTION_KEY:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      TAVILY_WEB_SEARCH: ${TAVILY_WEB_SEARCH:-}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-}
      WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED: ${WEB_SEARCH_ALWAYS_WEB_RETRIEVAL_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED: ${WEB_SEARCH_RETRIEVAL_FANOUT_ENABLED:-}
      WEB_SEARCH_FALLBACK_ENABLED: ${WEB_SEARCH_FALLBACK_ENABLED:-}
      WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD: ${WEB_SEARCH_FALLBACK_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD: ${WEB_SEARCH_EXPANSION_SIMILARITY_THRESHOLD:-}
      WEB_SEARCH_QUERY_PLANNER_ENABLED: ${WEB_SEARCH_QUERY_PLANNER_ENABLED:-}
      WEB_SEARCH_QUERY_PLANNER_USE_LLM: ${WEB_SEARCH_QUERY_PLANNER_USE_LLM:-}
      WEB_SEARCH_RETRIEVAL_LOOP_ENABLED: ${WEB_SEARCH_RETRIEVAL_LOOP_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM: ${WEB_SEARCH_RETRIEVAL_LOOP_USE_LLM:-}
      WEB_SEARCH_MULTI_QUERY_ENABLED: ${WEB_SEARCH_MULTI_QUERY_ENABLED:-}
      WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS: ${WEB_SEARCH_RETRIEVAL_MIN_UNIQUE_DOMAINS:-}
      WEB_SEARCH_MAX_QUERY_VARIANTS: ${WEB_SEARCH_MAX_QUERY_VARIANTS:-}
      WEB_SEARCH_DEFAULT_NUM: ${WEB_SEARCH_DEFAULT_NUM:-}
      WEB_SEARCH_MAX_CONTEXT_RESULTS: ${WEB_SEARCH_MAX_CONTEXT_RESULTS:-}
      WEB_SEARCH_FETCH_PAGE_CONTENT: ${WEB_SEARCH_FETCH_PAGE_CONTENT:-}
      WEB_SEARCH_MAX_PAGES_TO_FETCH: ${WEB_SEARCH_MAX_PAGES_TO_FETCH:-}
      WEB_SEARCH_MAX_CONCURRENCY: ${WEB_SEARCH_MAX_CONCURRENCY:-}
      WEB_SEARCH_QUEUE_WORKERS: ${WEB_SEARCH_QUEUE_WORKERS:-}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-}
      WEB_SEARCH_SEARCH_DEPTH: ${WEB_SEARCH_SEARCH_DEPTH:-}
      WEB_SEARCH_RETRY_MAX_ATTEMPTS: ${WEB_SEARCH_RETRY_MAX_ATTEMPTS:-}
      WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS: ${WEB_SEARCH_RETRY_BASE_BACKOFF_SECONDS:-}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-}
      BEDROCK_FALLBACK_MODEL_ID: ${BEDROCK_FALLBACK_MODEL_ID:-}
      BEDROCK_WEB_GROUNDING_ENABLED: ${BEDROCK_WEB_GROUNDING_ENABLED:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:-}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-}
    command: ["python", "-m", "app.scripts.llm_async_worker"]
    stop_grace_period: 20s

  eval-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-system:latest
    init: true
    restart: unless-stopped
    profiles: ["eval-queue"]
    environment:
      REDIS_RUNTIME_ROLE: app
      REDIS_LOCAL_TUNNEL_ENABLED: ${REDIS_LOCAL_TUNNEL_ENABLED:-}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-}
      MEMORY_ENCRYPTION_KEY: ${MEMORY_ENCRYPTION_KEY:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:-}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-}
    command: ["python", "-m", "app.scripts.eval_queue_worker"]
    stop_grace_period: 20s

  metrics-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-system:latest
    init: true
    restart: unless-stopped
    profiles: ["metrics-queue"]
    environment:
      REDIS_RUNTIME_ROLE: app
      REDIS_LOCAL_TUNNEL_ENABLED: ${REDIS_LOCAL_TUNNEL_ENABLED:-}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-}
      MEMORY_ENCRYPTION_KEY: ${MEMORY_ENCRYPTION_KEY:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
