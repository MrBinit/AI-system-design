      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      AWS_SECRETS_MANAGER_SECRET_ID: ${AWS_SECRETS_MANAGER_SECRET_ID:-}
      AWS_SECRETS_MANAGER_REGION: ${AWS_SECRETS_MANAGER_REGION:-}
    command: ["python", "-m", "app.scripts.metrics_aggregation_worker"]
    volumes:
      - ./data/metrics:/app/data/metrics
    stop_grace_period: 20s
